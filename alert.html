<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<title>TipAlert — OBS Alert</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@700;800&display=swap" rel="stylesheet"/>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background: transparent !important;
  overflow: hidden;
  font-family: 'Prompt', sans-serif;
}

.alert-container {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  text-align: center;
  pointer-events: none;
}

.alert-box {
  background: linear-gradient(135deg, rgba(10,5,20,0.95), rgba(25,10,45,0.95));
  border: 2px solid rgba(168,85,247,0.7);
  border-radius: 20px;
  padding: 20px 36px;
  backdrop-filter: blur(20px);
  box-shadow: 0 0 60px rgba(124,58,237,0.5), 0 0 120px rgba(124,58,237,0.2);
  min-width: 320px;
  display: none;
  animation: alertIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

.alert-box.hiding {
  animation: alertOut 0.5s ease forwards;
}

@keyframes alertIn {
  from { transform: scale(0.5) translateY(40px); opacity: 0; }
  to { transform: scale(1) translateY(0); opacity: 1; }
}

@keyframes alertOut {
  from { transform: scale(1) translateY(0); opacity: 1; }
  to { transform: scale(0.8) translateY(20px); opacity: 0; }
}

@keyframes pulse {
  0%, 100% { box-shadow: 0 0 60px rgba(124,58,237,0.5); }
  50% { box-shadow: 0 0 80px rgba(168,85,247,0.8), 0 0 140px rgba(124,58,237,0.3); }
}

.alert-box.show {
  display: block;
  animation: alertIn 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards, pulse 2s ease-in-out 1s infinite;
}

.alert-emoji { font-size: 36px; margin-bottom: 4px; }
.alert-name { font-size: 22px; font-weight: 700; color: #fff; }
.alert-amount {
  font-size: 48px;
  font-weight: 800;
  background: linear-gradient(135deg, #A855F7, #EC4899, #F59E0B);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  line-height: 1.1;
  margin: 4px 0;
}
.alert-message {
  font-size: 16px;
  color: rgba(255,255,255,0.85);
  margin-top: 6px;
  max-width: 400px;
  word-wrap: break-word;
}

/* Confetti particles */
.particle {
  position: fixed;
  width: 8px;
  height: 8px;
  border-radius: 2px;
  pointer-events: none;
  animation: fall linear forwards;
}

@keyframes fall {
  0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
</style>
</head>
<body>
<div class="alert-container">
  <div class="alert-box" id="alert-box">
    <div class="alert-emoji">🎉</div>
    <div class="alert-name" id="alert-name">ชื่อ donate!</div>
    <div class="alert-amount" id="alert-amount">฿100</div>
    <div class="alert-message" id="alert-message"></div>
  </div>
</div>

<script>
// รับข้อมูลจาก URL params (สำหรับ test)
// ในระบบจริงจะใช้ WebSocket เชื่อมกับ backend

function showAlert(name, amount, message) {
  const box = document.getElementById('alert-box')
  document.getElementById('alert-name').textContent = `${name} donate! 🎉`
  document.getElementById('alert-amount').textContent = `฿${amount}`
  document.getElementById('alert-message').textContent = message || ''

  box.classList.remove('hiding')
  box.style.display = 'block'
  box.classList.add('show')

  // Confetti
  spawnConfetti()

  // TTS
  speak(name, amount, message)

  // Hide after 8 seconds
  setTimeout(() => {
    box.classList.add('hiding')
    setTimeout(() => {
      box.style.display = 'none'
      box.classList.remove('show', 'hiding')
    }, 500)
  }, 8000)
}

function speak(name, amount, message) {
  if (!('speechSynthesis' in window)) return
  window.speechSynthesis.cancel()

  const announce = new SpeechSynthesisUtterance(`${name} donate ${amount} บาท`)
  announce.lang = 'th-TH'
  announce.rate = 0.95
  announce.pitch = 1.1
  window.speechSynthesis.speak(announce)

  if (message && message.trim()) {
    setTimeout(() => {
      const msgUtter = new SpeechSynthesisUtterance(message)
      // Auto detect language
      const isThai = /[\u0E00-\u0E7F]/.test(message)
      msgUtter.lang = isThai ? 'th-TH' : 'en-US'
      msgUtter.rate = 0.9
      window.speechSynthesis.speak(msgUtter)
    }, 2000)
  }
}

function spawnConfetti() {
  const colors = ['#A855F7','#EC4899','#F59E0B','#10B981','#3B82F6','#ffffff']
  for (let i = 0; i < 40; i++) {
    setTimeout(() => {
      const p = document.createElement('div')
      p.className = 'particle'
      p.style.left = Math.random() * 100 + 'vw'
      p.style.background = colors[Math.floor(Math.random() * colors.length)]
      p.style.animationDuration = (Math.random() * 2 + 2) + 's'
      p.style.animationDelay = Math.random() * 0.5 + 's'
      document.body.appendChild(p)
      setTimeout(() => p.remove(), 4000)
    }, i * 30)
  }
}

// Listen for test via URL param
const params = new URLSearchParams(window.location.search)
if (params.get('test')) {
  setTimeout(() => showAlert('TestUser', '99', params.get('msg') || 'ทดสอบระบบ alert!'), 1000)
}

// WebSocket connection (สำหรับ production)
// ใน production จะเชื่อม backend ที่นี่
// const ws = new WebSocket('wss://tipalert.app/ws/your-username?token=abc123')
// ws.onmessage = (e) => {
//   const data = JSON.parse(e.data)
//   if (data.type === 'donation') showAlert(data.name, data.amount, data.message)
// }
</script>
</body>
</html>
